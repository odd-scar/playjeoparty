services:
  - type: web
    name: jeoparty-api
    runtime: python
    rootDir: .
    buildCommand: ""
    startCommand: python server.py
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://playjeoparty.onrender.com
      - key: PORT
        value: 8000
      - key: CLUE_ADMIN_TOKEN
        sync: false
